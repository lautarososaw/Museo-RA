<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomía en RA - Museo</title>
    <!-- Importamos el script de Google para manejar el 3D y la RA -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f0f0f0; }
        model-viewer { width: 100vw; height: 100vh; }
        .instrucciones { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.8); padding: 10px; border-radius: 8px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

    <div class="instrucciones">Toca el botón para ver el corazón en el museo</div>

    <!-- Este componente activa ARCore en Android de forma automática -->
    <model-viewer 
        src="./corazon.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        tone-mapping="neutral" 
        poster="cargando.png" 
        shadow-intensity="1">
        
        <button slot="ar-button" style="background-color: #007bff; color: white; border: none; border-radius: 4px; padding: 12px; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 16px; cursor: pointer;">
            👋 Ver en mi espacio (RA)
        </button>
        
    </model-viewer>

</body>
</html>
